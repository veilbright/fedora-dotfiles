set -g status-bg '#222222'
set -g status-fg '#ffffff'

set -g automatic-rename-format "#{pane_current_command} #{s|^$HOME|~|:pane_current_path}"

set -g status-left ""
set -g status-right "#{session_name} "

set -g status-justify absolute-centre
set -g window-status-format "#W #I"
set -g window-status-current-format "#W #I"
set -g window-status-separator " │ "
set -g window-status-style fg='#888888'
set -g window-status-current-style fg='#ffffff'
